catalog:
  name: robonix.robot.wheeltec_robot
  version: 0.1.0
  description: Wheeltec R550 mini_tank — 2D SLAM mapping deploy (N10P lidar + rtabmap).
  tags:
    - robot
    - deploy
    - robonix
  maintainers:
    - Xiangrui Cheng <ccc_7020@qq.com>

name: wheeltec_robot

# ── env ───────────────────────────────────────────────────────────────────
# Propagated into every spawned process by rbnx boot.
# VLM_* are read by pilot to reach the LLM. Pre-export in your shell or
# replace ${VLM_*} with literal values (keep the secret in env vars).
env:
  LOG: "INFO"

# ── system ─────────────────────────────────────────────────────────────────
# Atlas: capability registry (all primitives/services register here).
# Executor: runs tool calls dispatched by pilot.
# Pilot: VLM brain — receives the task, plans, and calls tools via executor.
system:
  atlas:
    listen: 0.0.0.0:50051
  executor:
    listen: 0.0.0.0:50061
  pilot:
    listen: 127.0.0.1:50071
    vlm:
      upstream: ${VLM_BASE_URL}
      api_key: ${VLM_API_KEY}
      model: ${VLM_MODEL}
      api_format: openai
  liaison:
    listen: 0.0.0.0:50081
  soma:
    listen: 127.0.0.1:50091
    robot_yaml: /home/wheeltec/Desktop/rbnx_deploy/wheeltec_robot/soma.yaml
  #WARNING: Impossible for jetson orin nano.
  #scene:
    #manifest: package_manifest.jetson-native.yaml
    #camera_provider_id: astra_s_camera
    #web_port: 50107


# ── primitives ─────────────────────────────────────────────────────────────
# Boot order = declaration order (top → bottom). Must honour the dependency
# chain: robot_description → chassis → lidar.
#
# Each primitive runs as a native host process. The host must have:
#   - ROS 2 Humble sourced (/opt/ros/humble/setup.bash)
#   - turn_on_wheeltec_robot workspace in the ROS package path
#   - rbnx CLI on PATH
primitive:
  # ── 1st: URDF model + robot_state_publisher ──────────────────────────
  # Publishes /robot_description (TRANSIENT_LOCAL) and spawns
  # robot_state_publisher so the full TF tree is available to downstream
  # consumers (chassis joint_state_publisher, rtabmap, rviz).
  - name: robot_description
    path: /home/wheeltec/Desktop/rbnx_deploy/wheeltec_robot/primitives/robot_description
    config:
      robot_model: mini_tank

  # ── 2nd: chassis driver + IMU + EKF ───────────────────────────────────
  # Provides:
  #   robonix/primitive/chassis/odom    → /odom_combined  (EKF-fused)
  #   robonix/primitive/imu/imu         → /imu/data       (Madgwick-filtered)
  #   robonix/primitive/chassis/twist_in ← /cmd_vel
  # TF published:
  #   base_footprint → base_link        (static, z=0.03715 for mini_tank)
  #   base_footprint → gyro_link        (static, all zeros)
  - name: r550_chassis
    path: /home/wheeltec/Desktop/rbnx_deploy/wheeltec_robot/primitives/r550_chassis
    config:
      odom_topic_name: /odom_combined
      imu_topic: /imu/data
      imu_filter_config: /home/wheeltec/wheeltec_ros2/src/turn_on_wheeltec_robot/config/imu.yaml
      cmd_vel_topic: /cmd_vel
      base_to_link_z: 0.03715
      enable_imu_filter: true
      enable_joint_state_pub: true
      enable_ekf: true

  # ── 3rd: LSLIDAR N10P 2D laser ────────────────────────────────────────
  # Provides:
  #   robonix/primitive/lidar/lidar → /scan (sensor_msgs/LaserScan)
  # frame_id = laser. The base_link → laser TF edge comes from the URDF
  # via robot_state_publisher (no extrinsics static_transform_publisher
  # needed — the URDF already defines this joint).
  - name: n10p_lslidar
    path: /home/wheeltec/Desktop/rbnx_deploy/wheeltec_robot/primitives/n10p_lslidar
    config:
      scan_topic: /scan
      frame_id: laser

  # ── 4th: Orbbec Astra S RGB-D camera ──────────────────────────────────
  # Provides (topic_out):
  #   robonix/primitive/camera/rgb        → /camera/color/image_raw
  #   robonix/primitive/camera/depth      → /camera/depth/image_raw
  #   robonix/primitive/camera/intrinsics → /camera/intrinsics   (latched relay from camera_info)
  #   robonix/primitive/camera/extrinsics → /camera/extrinsics   (latched, URDF-sourced)
  # Provides (rpc MCP):
  #   robonix/primitive/camera/snapshot       → one-shot RGB JPEG (VLM-facing)
  #   robonix/primitive/camera/depth_snapshot → one-shot depth JPEG
  - name: astra_s_camera
    path: ./primitives/astra_s_camera
    config:
      color_topic: /camera/color/image_raw
      depth_topic: /camera/depth/image_raw
      intrinsics_topic: /camera/color/camera_info
      frame_id: camera_link

# ── services ────────────────────────────────────────────────────────────────
service:
  # ── SLAM mapping (rtabmap, 2D LaserScan + wheel odometry) ─────────────
  #
  # sensor_providers — each key enables a sensor role; each value pins the
  # Atlas provider that owns it. Must match Primitive(id=…) in driver code:
  #
  #   Key       Contract                              Provider ID
  #   ────────  ────────────────────────────────────  ──────────────
  #   lidar2d   robonix/primitive/lidar/lidar         n10p_lslidar
  #   odom      robonix/primitive/chassis/odom        r550_chassis
  #
  # rtabmap subscribes to /scan and /odom_combined. External odometry is
  # present → rtabmap skips its own ICP odometry node.
  #
  # Outputs (all under robonix/service/map/*):
  #   /map                   nav_msgs/OccupancyGrid       (2D grid)
  #   /rtabmap/cloud_map     sensor_msgs/PointCloud2      (3D fused cloud)
  #   /robonix/map/pose      PoseWithCovarianceStamped    (SLAM-corrected)
  #   /rtabmap/odom           nav_msgs/Odometry            (continuous)
  #
  # Web UI at http://<robot-ip>:8091 — live map preview + save/load/pose.
  - name: mapping
    path: /home/wheeltec/Desktop/rbnx_deploy/wheeltec_robot/services/service-map-rbnx
    manifest: package_manifest.jetson-native.yaml
    config:
      params_file: /home/wheeltec/Desktop/rbnx_deploy/wheeltec_robot/config/rtabmap_params.yaml
      algo: rtabmap
      occupancy_sources: [lidar]
      sensor_providers:
        lidar2d: n10p_lslidar
        odom: r550_chassis
      base_frame: base_link
      odom_frame: odom_combined
      webui_port: 8091

  # ── Navigation (Nav2) ───────────────────────────────────────────────────
  #
  # Wraps a system-installed Nav2 stack. Discovers its inputs through Atlas:
  #   /map  ← mapping (robonix/service/map/occupancy_grid)
  #   /odom ← chassis (robonix/primitive/chassis/odom)
  #   /scan ← lidar   (robonix/primitive/lidar/lidar)
  #
  # On Driver(CMD_INIT): spawns nav2_bringup, waits for navigate_to_pose
  # action server, then declares navigate/status/cancel on Atlas.
  #
  # params_file must be a deploy-owned Nav2 YAML placed next to this
  # manifest (e.g. config/nav2_params.yaml). Copy and tune the example
  # from service-navigation-rbnx/config/nav2_params.example.yml.
  - name: nav2
    path: ./services/service-navigation-rbnx
    manifest: package_manifest.jetson-docker.yaml
    config:
      params_file: /home/wheeltec/Desktop/rbnx_deploy/wheeltec_robot/config/param_mini_tank.yaml
      bt_xml_file: /home/wheeltec/Desktop/rbnx_deploy/wheeltec_robot/config/navigate.xml
      provider_ids:
        map: mapping
        odom: r550_chassis
        scan: n10p_lslidar
